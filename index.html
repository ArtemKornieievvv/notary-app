<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запис до нотаріуса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), 
                        url('https://img.freepik.com/free-photo/old-quill-pen-parchment-paper_1268-15494.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: #2c3e50;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; font-size: 1.4em; margin-bottom: 5px; }
        .schedule-info { text-align: center; font-size: 0.85em; color: #7f8c8d; margin-bottom: 15px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #2c3e50; border-radius: 10px; box-sizing: border-box;
            font-size: 16px; outline: none;
        }
        .service-list { 
            max-height: 200px; overflow-y: auto; 
            background: white; border-radius: 10px; 
            border: 1px solid #ddd; margin-bottom: 20px;
        }
        .service-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .selected { background: #2c3e50 !important; color: white; }
        button {
            width: 100%; padding: 18px; background: #27ae60; color: white;
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏛 Послуги нотаріуса</h2>
        <div class="schedule-info">Пн-Пт: 09:00-18:00 | Сб: 10:00-16:00 | Нд: Вихідний</div>
        
        <input type="text" id="search" placeholder="🔍 Пошук послуги..." onkeyup="filterServices()">
        <div class="service-list" id="services"></div>

        <h3>📅 Оберіть дату</h3>
        <input type="date" id="date_input">

        <button onclick="sendData()">ПІДТВЕРДИТИ</button>
    </div>

    <script>
        const services = [
            "Довіреність на майно", "Довіреність на авто", "Згода на виїзд дитини",
            "Відмова від спадщини", "Купівля-продаж нерухомості", "Дарування",
            "Заповіт", "Засвідчення копій", "Засвідчення підпису",
            "Спадщина", "Переклад", "Оренда", "Консультація", "Шлюбний договір"
        ];

        let selectedService = "";
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Установка минимальной даты - сегодня
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date_input').setAttribute('min', today);

        function renderServices() {
            const container = document.getElementById('services');
            container.innerHTML = services.map(s => `<div class="service-item" onclick="selectService(this, '${s}')">${s}</div>`).join('');
        }

        function filterServices() {
            const query = document.getElementById('search').value.toLowerCase();
            const items = document.querySelectorAll('.service-item');
            items.forEach(item => { item.style.display = item.innerText.toLowerCase().includes(query) ? 'block' : 'none'; });
        }

        function selectService(el, name) {
            document.querySelectorAll('.service-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedService = name;
            document.getElementById('search').value = name;
        }

        function sendData() {
            const dateStr = document.getElementById('date_input').value;
            if (!selectedService || !dateStr) {
                tg.showAlert("Оберіть послугу та дату!");
                return;
            }

            const selectedDate = new Date(dateStr);
            if (selectedDate.getDay() === 0) { // 0 - это воскресенье
                tg.showAlert("Неділя — вихідний день. Будь ласка, оберіть іншу дату.");
                return;
            }

            const result = { service: selectedService, date: dateStr };
            tg.sendData(JSON.stringify(result));
            tg.close(); // Принудительно закрываем приложение
        }

        renderServices();
    </script>
</body>
</html>
